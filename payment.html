<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Booke | Payment</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url("Bookstore.jpeg");
  background-size: cover;
  background-position: center;
  font-family: system-ui, sans-serif;
  padding: 40px;
}

h1 {
  text-align: center;
  color: white;
  margin-bottom: 30px;
}

.book {
  max-width: 560px;
  margin: auto;
  background: white;
  padding: 32px;
  border-radius: 14px;
}

h2 {
  margin-bottom: 4px;
}

.price {
  color: #555;
  margin-bottom: 22px;
}

input, select {
  width: 100%;
  padding: 12px;
  margin-bottom: 14px;
  border: 1px solid #ccc;
  border-radius: 6px;
  font-size: 14px;
}

.row {
  display: flex;
  gap: 12px;
}

.label {
  font-size: 14px;
  margin: 16px 0 10px;
  font-weight: 600;
}

/* PAYMENT OPTIONS */
.options {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.pay-option {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  border: 1.5px solid #ccc;
  border-radius: 8px;
  font-size: 14px;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  user-select: none;
}

.pay-option:has(input:checked) {
  border-color: #000;
  background: #f5f5f5;
}

.pay-option input[type="radio"] {
  width: auto;
  margin: 0;
  padding: 0;
  margin-bottom: 0;
  flex-shrink: 0;
  accent-color: #000;
}

.payment-box {
  display: none;
  margin-top: 12px;
  padding: 16px;
  border: 1px solid #ddd;
  border-radius: 8px;
  background: #fafafa;
}

.payment-box input:last-of-type {
  margin-bottom: 0;
}

button {
  width: 100%;
  padding: 15px;
  margin-top: 20px;
  background: black;
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 15px;
  font-weight: 600;
  cursor: not-allowed;
  opacity: 0.6;
}

button.active {
  cursor: pointer;
  opacity: 1;
}

.back {
  display: block;
  text-align: center;
  margin-top: 26px;
  color: white;
  text-decoration: none;
}
</style>
</head>

<body>

<h1>Payment</h1>

<div class="book">
  <h2 id="bookName"></h2>
  <p class="price" id="bookPrice"></p>

  <input id="name" placeholder="Full Name">
  <input id="email" type="email" placeholder="Email Address">

  <div class="row">
    <select id="country">
      <option value="">Code</option>
      <option value="+91">+91 (India)</option>
      <option value="+1">+1 (USA)</option>
      <option value="+44">+44 (UK)</option>
    </select>
    <input id="phone" type="tel" placeholder="Phone Number">
  </div>

  <input id="address" placeholder="Address">
  <input id="city" placeholder="City">
  <input id="pin" placeholder="PIN Code">

  <p class="label">Payment Method</p>

  <div class="options">
    <label class="pay-option">
      <input type="radio" name="pay" value="cod">
      Cash on Delivery
    </label>

    <label class="pay-option">
      <input type="radio" name="pay" value="upi">
      UPI
    </label>

    <label class="pay-option">
      <input type="radio" name="pay" value="card">
      Credit / Debit Card
    </label>
  </div>

  <!-- UPI -->
  <div id="upiBox" class="payment-box">
    <input id="upiName" placeholder="UPI Name">
    <input id="upiId" placeholder="UPI ID (name@upi)">
  </div>

  <!-- CARD -->
  <div id="cardBox" class="payment-box">
    <input id="cardName" placeholder="Cardholder Name">
    <input id="cardNumber" placeholder="Card Number">
    <div class="row">
      <input id="expiry" placeholder="MM/YY">
      <input id="cvv" type="password" placeholder="CVV">
    </div>
  </div>

  <button id="payBtn">Place Order</button>
</div>

<a href="catalog.html" class="back">← Back to Catalog</a>

<script>
const params = new URLSearchParams(location.search);
document.getElementById("bookName").textContent = params.get("book") || "Selected Book";
document.getElementById("bookPrice").textContent = "₹" + (params.get("price") || "0");

const btn = document.getElementById("payBtn");
const upiBox = document.getElementById("upiBox");
const cardBox = document.getElementById("cardBox");

document.querySelectorAll("input[name='pay']").forEach(radio => {
  radio.addEventListener("change", () => {
    upiBox.style.display = radio.value === "upi" ? "block" : "none";
    cardBox.style.display = radio.value === "card" ? "block" : "none";
    validate();
  });
});

document.querySelectorAll("input, select").forEach(el =>
  el.addEventListener("input", validate)
);

function validate() {
  let valid =
    document.getElementById("name").value.trim() &&
    document.getElementById("email").value.includes("@") &&
    document.getElementById("country").value &&
    document.getElementById("phone").value.length >= 10 &&
    document.getElementById("address").value.trim() &&
    document.getElementById("city").value.trim() &&
    document.getElementById("pin").value.trim();

  const pay = document.querySelector("input[name='pay']:checked");
  if (!pay) valid = false;

  if (pay?.value === "upi") {
    valid = valid && document.getElementById("upiName").value.trim() &&
            document.getElementById("upiId").value.includes("@");
  }

  if (pay?.value === "card") {
    valid = valid && document.getElementById("cardName").value.trim() &&
            document.getElementById("cardNumber").value.length >= 12 &&
            document.getElementById("cvv").value.length === 3;
  }

  btn.disabled = !valid;
  btn.classList.toggle("active", !!valid);
}

btn.addEventListener("click", () => {
  if (!btn.classList.contains("active")) return;
  location.href = "confirmation.html";
});
</script>

</body>
</html>
