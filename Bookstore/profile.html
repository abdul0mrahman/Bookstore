<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Booke | Profile</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      height: 100vh;
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url("Bookstore.jpeg");
      background-size: cover;
      background-position: center;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .profile-container {
      background: white;
      padding: 35px 40px;
      width: 420px;
      border-radius: 8px;
      text-align: center;
      color: black;
    }

    h1 { margin-bottom: 25px; }

    .row { display: flex; margin-bottom: 15px; text-align: left; }

    .label { width: 140px; font-size: 14px; opacity: 0.9; }

    .value { font-size: 14px; font-weight: 500; }

    .btn {
      display: block;
      margin-top: 20px;
      padding: 12px;
      background: black;
      color: white;
      text-decoration: none;
      font-weight: 500;
      border-radius: 4px;
    }

    .link {
      display: block;
      margin-top: 15px;
      color: black;
      text-decoration: none;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div class="profile-container">
    <h1>User Profile</h1>

    <div class="row">
      <div class="label">Full Name:</div>
      <div class="value">Abdul Rahman</div>
    </div>
    <div class="row">
      <div class="label">Email:</div>
      <div class="value">abdul0mrahman@gmail.com</div>
    </div>
    <div class="row">
      <div class="label">Phone:</div>
      <div class="value">8019299010</div>
    </div>
    <div class="row">
      <div class="label">Username:</div>
      <div class="value">Aboodi</div>
    </div>

    <a href="catalog.html" class="btn">Go to Catalog</a>
    <a href="index.html" class="link">Back to Home</a>
  </div>
</body>
</html>
