<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Booke | Welcome</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      height: 100vh;
      background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)), url("Bookstore.jpeg");
      background-size: cover;
      background-position: center;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      text-align: center;
      position: relative;
    }

    h1 { font-size: 56px; margin-bottom: 15px; }

    p { font-size: 15px; margin-bottom: 10px; }

    a {
      color: white;
      font-weight: 500;
      text-decoration: underline; /* underline Log in */
    }

    a:hover { opacity: 0.8; }

    /* top-right catalog link */
    .catalog {
      position: absolute;
      top: 20px;
      right: 30px;
      text-decoration: none;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <a href="catalog.html" class="catalog">Catalog</a>

  <div>
    <h1>Welcome to Booke</h1>
    <p>Create a new account? <a href="registration.html">Sign-Up</a></p>
  </div>

</body>
</html>
