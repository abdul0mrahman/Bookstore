<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Booke | Order Confirmed</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)), url("Bookstore.jpeg");
      background-size: cover;
      background-position: center;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px;
    }

    .box {
      background: white;
      padding: 50px 40px;
      border-radius: 8px;
      text-align: center;
      max-width: 480px;
      width: 100%;
      color: black;
    }

    h1 { font-size: 28px; margin-bottom: 12px; }

    p { font-size: 14px; line-height: 1.7; margin-bottom: 8px; }

    .divider { border: none; border-top: 1px solid #ddd; margin: 25px 0; }

    a {
      display: inline-block;
      margin-top: 10px;
      padding: 12px 30px;
      background: black;
      color: white;
      text-decoration: none;
      font-weight: 600;
      border-radius: 5px;
    }

    .back {
      display: block;
      margin-top: 15px;
      background: transparent;
      border: 1px solid black;
      color: black;
      padding: 10px 30px;
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>Order Confirmed!</h1>
    <p>Thank you for shopping with <strong>Booke</strong>.</p>
    <p>Your book is on its way. You'll receive it within <strong>3–5 business days</strong>.</p>

    <hr class="divider">

    <p>A confirmation has been sent to your phone.</p>
    <p>Track your order via the delivery partner's link.</p>

    <a href="catalog.html">Browse More Books</a>
    <a href="profile.html" class="back">← Back to Profile</a>
  </div>

</body>
</html>
